<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Porsche Build Experience</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <!-- Style -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hero">
    <h1>Build Your Porsche</h1>
    <p>Select your driving philosophy.</p>

    <div class="buttons">
      <button onclick="selectBuild('rwb', this)">RWB</button>
      <button onclick="selectBuild('singer', this)">Singer</button>
      <button onclick="selectBuild('gunther', this)">Gunther Werks</button>
    </div>

    <div id="result"></div>
  </div>

  <!-- video modal -->
  <div id="videoModal" class="modal" onclick="closeVideo()">
    <iframe id="videoFrame" frameborder="0" allowfullscreen></iframe>
  </div>

  <script src="script.js"></script>
</body>
</html>
