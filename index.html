<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Porsche Build Experience</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hero">
    <h1>Build Your Porsche</h1>
    <p>Select your driving philosophy.</p>

    <div class="buttons">
      <button onclick="selectBuild('rwb', this)">RWB</button>
      <button onclick="selectBuild('singer', this)">Singer</button>
      <button onclick="selectBuild('gunther', this)">Gunther Werks</button>
    </div>

    <div id="result"></div>
  </div>

  <!-- Your JS -->
  <script src="script.js"></script>

  <!-- 🔥 REQUIRED for Instagram embeds -->
  <script async src="https://www.instagram.com/embed.js"></script>

</body>
</html>
